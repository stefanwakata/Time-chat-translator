name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Time chat translator"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: "Time chat translator/dist"
          retention-days: 1

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build TypeScript
        run: npm run build

  # ─── Docker ─────────────────────────────────────────────────────────────────
  docker:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            -t time-chat-translator-frontend:${{ github.sha }} \
            "Time chat translator"

      - name: Build backend image
        run: |
          docker build \
            -t time-chat-translator-backend:${{ github.sha }} \
            backend
